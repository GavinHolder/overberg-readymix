{% load static %}
<!DOCTYPE html>
<html lang="en">

    <title>{% block title %}Overberg Readymix{% endblock %}</title>

    <!-- Bootstrap 5 -->

    <!-- Custom CSS -->
    {% block extra_css %}{% endblock %}
</head>
<body>

{% block content %}{% endblock %}
