# Production stack — deployed via Portainer
# Supply .env.production on the server (NOT in this repo)
# Usage: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d

services:
  web:
    build:
      target: production
    env_file: .env.production
    environment:
      DJANGO_SETTINGS_MODULE: Overberg_Readymix.settings.production
    labels:
      - "traefik.enable=true"
      # HTTP → HTTPS redirect handled by Traefik middleware
      - "traefik.http.routers.overberg.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.overberg.entrypoints=websecure"
      - "traefik.http.routers.overberg.tls=true"
      - "traefik.http.routers.overberg.tls.certresolver=letsencrypt"
      - "traefik.http.services.overberg.loadbalancer.server.port=8000"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/mediafiles

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/mediafiles:ro
    labels:
      - "traefik.enable=false"   # Traefik talks directly to web (gunicorn)
    networks:
      - internal
    depends_on:
      - web

  db:
    env_file: .env.production

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_data:
  static_files:
  media_files:

networks:
  internal:
    driver: bridge
  traefik_public:
    external: true
    name: traefik_public
