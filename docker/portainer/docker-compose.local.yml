# Portainer stack — LOCAL
# Accessible at http://portainer.localhost (via Traefik) or http://localhost:9000 directly.
# Start Traefik stack first.

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer_local
    restart: unless-stopped
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - portainer_data:/data
    ports:
      - "9000:9000"    # Direct access
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.localhost`)"
      - "traefik.http.routers.portainer.entrypoints=web"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
    networks:
      - traefik_public

volumes:
  portainer_data:

networks:
  traefik_public:
    external: true
    name: traefik_public
